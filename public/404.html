<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kjira's SNES Journey</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the full path into the query string so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
